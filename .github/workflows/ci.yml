name: Quality gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${{ secrets.NEXT_PUBLIC_SUPPORT_EMAIL }}
      NEXT_PUBLIC_PRIVACY_EMAIL: ${{ secrets.NEXT_PUBLIC_PRIVACY_EMAIL }}
      NEXT_PUBLIC_LEGAL_NAME: "Prepora CI"
      NEXT_PUBLIC_LEGAL_JURISDICTION: "CI"
      NEXT_PUBLIC_APP_URL: "https://ci.prepora.example"
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      NEXT_PUBLIC_VAPI_WEB_TOKEN: ${{ secrets.NEXT_PUBLIC_VAPI_WEB_TOKEN }}
      NEXT_PUBLIC_VAPI_WORKFLOW_ID: ${{ secrets.NEXT_PUBLIC_VAPI_WORKFLOW_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PYTHON_API_URL: "https://coach.prepora.example"
      INTERNAL_SERVICE_KEY: ${{ secrets.INTERNAL_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run audit:production
      - name: Require build credentials
        run: |
          test -n "$DATABASE_URL"
          test -n "$NEXT_PUBLIC_SUPPORT_EMAIL"
          test -n "$NEXT_PUBLIC_PRIVACY_EMAIL"
          test -n "$NEXT_PUBLIC_GOOGLE_CLIENT_ID"
          test -n "$NEXT_PUBLIC_VAPI_WEB_TOKEN"
          test -n "$NEXT_PUBLIC_VAPI_WORKFLOW_ID"
          test -n "$GEMINI_API_KEY"
          test -n "$INTERNAL_SERVICE_KEY"
      - run: npm run validate:production
      - run: npm run build

  python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r python-backend/requirements-dev.txt
      - run: python -m pip_audit -r python-backend/requirements.txt
      - run: python -m pytest python-backend/tests
        env:
          PYTHONPATH: python-backend
